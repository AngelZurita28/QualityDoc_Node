services:
  node_backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: node_backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - JSON_BODY_LIMIT=${JSON_BODY_LIMIT:-15mb}
      - MONGO_DB=QualityDocDB
      - MONGO_HOST=mongodb
      - MONGO_PORT=27017
      - MONGO_USER=${MONGO_USER}
      - MONGO_PASS=${MONGO_PASS}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash-lite}
    volumes:
      - .:/app
      # Evitamos que los node_modules locales sobrescriban los del contenedor
      - /app/node_modules
    working_dir: /app
    # Instalamos dependencias y corremos con nodemon + tsx para auto-recarga en TS
    command: bash -c "pnpm install --frozen-lockfile --config.minimum-release-age=0 && pnpm exec nodemon --watch src --ext ts --exec 'node --import tsx' src/index.ts"
    depends_on:
      - mongodb

  mongodb:
    image: mongo:latest
    container_name: mongodb
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASS}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
