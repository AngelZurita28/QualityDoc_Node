version: '3.8'

services:
  node_backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: node_backend
    # Modo host: la app se conecta a la DB via localhost:27017
    # y es accesible desde fuera por la IP de la maquina
    network_mode: host
    environment:
      - PORT=3000
      - MONGO_URI=mongodb://${MONGO_USER}:${MONGO_PASS}@127.0.0.1:27017/QualityDocDB?authSource=admin
      - MONGO_USER=${MONGO_USER}
      - MONGO_PASS=${MONGO_PASS}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - .:/app
      # Evitamos que los node_modules locales sobrescriban los del contenedor
      - /app/node_modules
    working_dir: /app
    # Instalamos dependencias y corremos con nodemon + tsx para auto-recarga en TS
    command: bash -c "pnpm install && npx nodemon --watch src --ext ts --exec 'node --import tsx' src/index.ts"
    depends_on:
      - mongodb

  mongodb:
    image: mongo:latest
    container_name: mongodb
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASS}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
